<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Service Desk</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Archivo:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

:root {
  --white:   #ffffff;
  --off:     #fafafa;
  --rule:    #e8e8e8;
  --rule2:   #d0d0d0;
  --ink:     #111111;
  --ink2:    #555555;
  --ink3:    #999999;
  --ink4:    #cccccc;
  --accent:  #111111;
  --red:     #cc2200;
  --green:   #007744;
  --amber:   #996600;
  --blue:    #0044cc;
  --r:       2px;
}

body {
  font-family: 'Archivo', sans-serif;
  background: var(--white);
  color: var(--ink);
  font-size: 12.5px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ── Grid ── */
.app { display: flex; height: 100vh; }

/* ── Sidebar ── */
.sidebar {
  width: 200px;
  min-width: 200px;
  border-right: 1px solid var(--rule);
  display: flex;
  flex-direction: column;
  background: var(--white);
}

.logo {
  padding: 20px 20px 18px;
  border-bottom: 1px solid var(--rule);
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.logo-word {
  font-family: 'Archivo', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink);
}
.logo-sub {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  font-weight: 300;
  letter-spacing: 0.08em;
  color: var(--ink3);
  text-transform: uppercase;
}

.nav { flex: 1; padding: 16px 0 0; }
.nav-group { margin-bottom: 20px; }
.nav-heading {
  padding: 0 20px 6px;
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink4);
}
.nav-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 7px 20px;
  font-size: 12px;
  font-weight: 400;
  color: var(--ink2);
  cursor: pointer;
  transition: color 0.1s;
  border-left: 1px solid transparent;
  margin-left: -1px;
}
.nav-item:hover { color: var(--ink); }
.nav-item.active {
  color: var(--ink);
  font-weight: 500;
  border-left-color: var(--ink);
  background: var(--off);
}
.nav-n {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 300;
  color: var(--ink3);
}
.nav-item.active .nav-n { color: var(--ink); font-weight: 500; }

.sidebar-foot {
  padding: 14px 20px;
  border-top: 1px solid var(--rule);
}
.agent-line {
  display: flex;
  align-items: center;
  gap: 8px;
}
.agent-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  flex-shrink: 0;
}
.agent-name {
  font-size: 11px;
  font-weight: 500;
  color: var(--ink);
}
.agent-role {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--ink3);
  margin-top: 1px;
  letter-spacing: 0.04em;
}

/* ── Main ── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* ── Topbar ── */
.topbar {
  height: 48px;
  border-bottom: 1px solid var(--rule);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 12px;
  flex-shrink: 0;
  background: var(--white);
}
.topbar-title {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink);
  flex: 1;
}
.btn {
  padding: 5px 12px;
  font-size: 11px;
  font-weight: 500;
  font-family: 'Archivo', sans-serif;
  letter-spacing: 0.04em;
  border: 1px solid var(--rule2);
  border-radius: var(--r);
  background: var(--white);
  color: var(--ink2);
  cursor: pointer;
  transition: all 0.1s;
  display: flex;
  align-items: center;
  gap: 5px;
  white-space: nowrap;
}
.btn:hover { border-color: var(--ink); color: var(--ink); }
.btn-solid {
  background: var(--ink);
  border-color: var(--ink);
  color: var(--white);
}
.btn-solid:hover { background: #333; border-color: #333; color: var(--white); }
.btn:disabled { opacity: 0.35; cursor: not-allowed; }

/* ── Stats ── */
.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  border-bottom: 1px solid var(--rule);
  flex-shrink: 0;
}
.stat {
  padding: 14px 20px;
  border-right: 1px solid var(--rule);
}
.stat:last-child { border-right: none; }
.stat-n {
  font-family: 'DM Mono', monospace;
  font-size: 22px;
  font-weight: 300;
  letter-spacing: -0.02em;
  color: var(--ink);
  line-height: 1;
}
.stat-n.is-red   { color: var(--red); }
.stat-n.is-green { color: var(--green); }
.stat-n.is-amber { color: var(--amber); }
.stat-n.is-blue  { color: var(--blue); }
.stat-l {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  font-weight: 300;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink3);
  margin-top: 4px;
}

/* ── Content ── */
.content { flex: 1; display: flex; overflow: hidden; }

/* ── List ── */
.list-col {
  width: 280px;
  min-width: 280px;
  border-right: 1px solid var(--rule);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.list-filters {
  padding: 10px 16px;
  border-bottom: 1px solid var(--rule);
  display: flex;
  gap: 2px;
  flex-wrap: wrap;
}
.fpill {
  padding: 3px 9px;
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.04em;
  border: 1px solid transparent;
  cursor: pointer;
  background: transparent;
  color: var(--ink3);
  font-family: 'Archivo', sans-serif;
  transition: all 0.1s;
  border-radius: var(--r);
}
.fpill:hover { color: var(--ink); border-color: var(--rule2); }
.fpill.on { border-color: var(--ink); color: var(--ink); background: var(--off); }

.list-scroll { flex: 1; overflow-y: auto; }
.list-scroll::-webkit-scrollbar { width: 3px; }
.list-scroll::-webkit-scrollbar-thumb { background: var(--rule2); }

.trow {
  padding: 12px 16px;
  border-bottom: 1px solid var(--rule);
  cursor: pointer;
  transition: background 0.08s;
  border-left: 2px solid transparent;
}
.trow:hover { background: var(--off); }
.trow.on { background: var(--off); border-left-color: var(--ink); }
.trow.urg { border-left-color: var(--red); }
.trow.urg.on { border-left-color: var(--red); }

.trow-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 8px;
  margin-bottom: 5px;
}
.trow-subj {
  font-size: 12px;
  font-weight: 500;
  color: var(--ink);
  line-height: 1.4;
  overflow: hidden;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
}
.trow-age {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  font-weight: 300;
  color: var(--ink3);
  white-space: nowrap;
  padding-top: 2px;
}
.trow-foot {
  display: flex;
  align-items: center;
  gap: 5px;
  flex-wrap: wrap;
}

.tag {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  padding: 1px 5px;
  border-radius: 1px;
}
.tag-open     { border: 1px solid #0044cc44; color: var(--blue); background: #0044cc08; }
.tag-urgent   { border: 1px solid #cc220044; color: var(--red);  background: #cc220008; }
.tag-pending  { border: 1px solid #99660044; color: var(--amber);background: #99660008; }
.tag-resolved { border: 1px solid #00774444; color: var(--green);background: #00774408; }
.tag-ch       { border: 1px solid var(--rule); color: var(--ink3); background: transparent; }

/* ── Detail ── */
.detail-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.detail-head {
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--rule);
  flex-shrink: 0;
}
.detail-subj {
  font-size: 14px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.35;
  margin-bottom: 8px;
  letter-spacing: -0.01em;
}
.detail-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.meta-sep {
  width: 1px;
  height: 10px;
  background: var(--rule2);
}
.meta-txt {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  font-weight: 300;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--ink3);
}

/* ── Thread ── */
.thread {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.thread::-webkit-scrollbar { width: 3px; }
.thread::-webkit-scrollbar-thumb { background: var(--rule2); }

.msg {
  padding: 12px 14px;
  font-size: 12.5px;
  line-height: 1.7;
  color: var(--ink2);
  animation: up 0.15s ease;
  border-left: 2px solid transparent;
}
@keyframes up { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }

.msg-customer {
  background: var(--off);
  border-left-color: var(--rule2);
  align-self: flex-start;
  max-width: 76%;
  border-radius: 0 var(--r) var(--r) 0;
}
.msg-agent {
  align-self: flex-end;
  max-width: 76%;
  background: var(--white);
  border: 1px solid var(--rule);
  border-left: 2px solid var(--ink);
  border-radius: 0 var(--r) var(--r) 0;
  color: var(--ink);
}
.msg-ai {
  align-self: flex-end;
  max-width: 76%;
  background: var(--white);
  border: 1px solid var(--rule);
  border-left: 2px solid var(--green);
  border-radius: 0 var(--r) var(--r) 0;
  color: var(--ink);
}

.msg-from {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--ink3);
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.msg-agent .msg-from { color: var(--ink); }
.msg-ai .msg-from    { color: var(--green); }

.ai-mark {
  font-family: 'DM Mono', monospace;
  font-size: 8px;
  letter-spacing: 0.08em;
  padding: 0 4px;
  border: 1px solid var(--green);
  color: var(--green);
  border-radius: 1px;
}

/* ── Reply ── */
.reply {
  border-top: 1px solid var(--rule);
  flex-shrink: 0;
}
.reply-tabs {
  display: flex;
  padding: 0 16px;
  border-bottom: 1px solid var(--rule);
}
.rtab {
  padding: 8px 10px;
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink3);
  cursor: pointer;
  border-bottom: 1px solid transparent;
  margin-bottom: -1px;
  transition: color 0.1s;
}
.rtab:hover { color: var(--ink2); }
.rtab.on { color: var(--ink); border-bottom-color: var(--ink); }

.reply-body { padding: 12px 16px 14px; }
textarea.compose {
  width: 100%;
  font-family: 'Archivo', sans-serif;
  font-size: 12.5px;
  line-height: 1.6;
  color: var(--ink);
  background: var(--white);
  border: 1px solid var(--rule);
  border-radius: var(--r);
  padding: 9px 12px;
  resize: none;
  outline: none;
  height: 72px;
  transition: border-color 0.1s;
}
textarea.compose:focus { border-color: var(--ink); }
textarea.compose::placeholder {
  color: var(--ink4);
  font-weight: 300;
}

.reply-foot {
  margin-top: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.reply-foot-l { display: flex; align-items: center; gap: 8px; }

select.ssel {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 5px 8px;
  background: var(--white);
  border: 1px solid var(--rule);
  border-radius: var(--r);
  color: var(--ink2);
  cursor: pointer;
  outline: none;
  transition: border-color 0.1s;
}
select.ssel:focus { border-color: var(--ink); }

.thinking {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--green);
  display: none;
  align-items: center;
  gap: 5px;
}
.thinking.show { display: flex; }
.dot { display: inline-block; animation: blink 1.2s infinite; }
.dot:nth-child(2) { animation-delay: .2s; }
.dot:nth-child(3) { animation-delay: .4s; }
@keyframes blink { 0%,80%,100%{opacity:.15} 40%{opacity:1} }

/* ── Empty ── */
.empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 10px;
}
.empty-rule {
  width: 32px;
  height: 1px;
  background: var(--rule2);
}
.empty-txt {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink4);
}
</style>
</head>
<body>
<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">
      <div class="logo-word">Service Desk</div>
      <div class="logo-sub">AI — Assisted</div>
    </div>

    <nav class="nav">
      <div class="nav-group">
        <div class="nav-heading">Queue</div>
        <div class="nav-item active" onclick="setView('all',this)">
          All tickets <span class="nav-n" id="nc-all">6</span>
        </div>
        <div class="nav-item" onclick="setView('open',this)">
          Open <span class="nav-n" id="nc-open">2</span>
        </div>
        <div class="nav-item" onclick="setView('urgent',this)">
          Urgent <span class="nav-n" id="nc-urgent">1</span>
        </div>
        <div class="nav-item" onclick="setView('resolved',this)">
          Resolved <span class="nav-n" id="nc-resolved">2</span>
        </div>
      </div>
      <div class="nav-group">
        <div class="nav-heading">Assist</div>
        <div class="nav-item" onclick="aiTriage()">Auto-triage</div>
        <div class="nav-item" onclick="bulkReply()">Bulk AI reply</div>
      </div>
    </nav>

    <div class="sidebar-foot">
      <div class="agent-line">
        <div class="agent-dot"></div>
        <div>
          <div class="agent-name">Support Agent</div>
          <div class="agent-role">Online · Agent</div>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">

    <div class="topbar">
      <div class="topbar-title" id="page-title">All tickets</div>
      <div style="display:flex;gap:6px">
        <button class="btn" onclick="addTicket()">+ New</button>
        <button class="btn btn-solid" id="triage-btn" onclick="aiTriage()">AI Triage</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-n is-blue" id="sv-open">2</div>
        <div class="stat-l">Open</div>
      </div>
      <div class="stat">
        <div class="stat-n is-red" id="sv-urgent">1</div>
        <div class="stat-l">Urgent</div>
      </div>
      <div class="stat">
        <div class="stat-n is-green" id="sv-resolved">2</div>
        <div class="stat-l">Resolved</div>
      </div>
      <div class="stat">
        <div class="stat-n is-amber" id="sv-ai">5</div>
        <div class="stat-l">AI replies</div>
      </div>
    </div>

    <div class="content">

      <!-- List -->
      <div class="list-col">
        <div class="list-filters">
          <button class="fpill on" onclick="filter('all',this)">All</button>
          <button class="fpill" onclick="filter('open',this)">Open</button>
          <button class="fpill" onclick="filter('urgent',this)">Urgent</button>
          <button class="fpill" onclick="filter('pending',this)">Pending</button>
          <button class="fpill" onclick="filter('resolved',this)">Resolved</button>
        </div>
        <div class="list-scroll" id="tlist"></div>
      </div>

      <!-- Detail -->
      <div class="detail-col" id="detail">
        <div class="empty">
          <div class="empty-rule"></div>
          <div class="empty-txt">Select a ticket</div>
          <div class="empty-rule"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
const DATA = [
  { id:1, subject:"Payment not processing at checkout", customer:"Sarah Mitchell", initials:"SM",
    status:"urgent", channel:"Email", age:"2m",
    msgs:[
      {from:"Sarah Mitchell",r:"customer",t:"Hi, I've been trying to checkout for the past hour but my payment keeps failing. I've tried two different cards. This is really frustrating as I need this order urgently."},
      {from:"AI Agent",r:"ai",t:"Hi Sarah, I can see a temporary fraud-protection hold on transactions over £200 on your account. I've escalated this to our payments team for immediate review. In the meantime, could you try PayPal as an alternative? You should hear back within 30 minutes."}
    ]},
  { id:2, subject:"How do I export transaction history to CSV?", customer:"James Reed", initials:"JR",
    status:"open", channel:"Live Chat", age:"14m",
    msgs:[
      {from:"James Reed",r:"customer",t:"I need to export all my transaction history to CSV for my accountant. I've looked through all the dashboard settings but can't find the export option anywhere."}
    ]},
  { id:3, subject:"Account locked after password reset", customer:"Nina Kowalski", initials:"NK",
    status:"open", channel:"Email", age:"1h",
    msgs:[
      {from:"Nina Kowalski",r:"customer",t:"I reset my password using the link you sent, but now the system says my account is locked. I have a client presentation in 2 hours and really need access."},
      {from:"Support Agent",r:"agent",t:"Hi Nina, the lockout triggers automatically after 3 failed attempts during the reset flow — I'm unlocking it now. Please try logging in again in 2 minutes."}
    ]},
  { id:4, subject:"Resend March 2025 invoice", customer:"Tom Brewer", initials:"TB",
    status:"pending", channel:"Email", age:"3h",
    msgs:[
      {from:"Tom Brewer",r:"customer",t:"Hi there, could you resend the invoice for March 2025? I've accidentally deleted the email and need it for our quarterly accounts."}
    ]},
  { id:5, subject:"Feature request: bulk user import via CSV", customer:"Priya Sharma", initials:"PS",
    status:"resolved", channel:"Portal", age:"1d",
    msgs:[
      {from:"Priya Sharma",r:"customer",t:"It would be really helpful to import users in bulk via CSV rather than one by one. We have 200+ users to migrate from our old system."},
      {from:"AI Agent",r:"ai",t:"Thanks Priya — logged as high-priority. It's on the Q3 roadmap and you'll be notified when it ships. In the meantime, our team can do a one-off bulk import for you — shall I arrange that?"}
    ]},
  { id:6, subject:"iOS app very slow on iPhone 14", customer:"Carlos Diaz", initials:"CD",
    status:"resolved", channel:"App", age:"2d",
    msgs:[
      {from:"Carlos Diaz",r:"customer",t:"The mobile app is unusably slow on my iPhone 14. The main dashboard takes 8+ seconds to load every time."},
      {from:"AI Agent",r:"ai",t:"Hi Carlos, we patched a performance regression affecting iOS 17 devices earlier today — it's in v4.2.1. Could you update the app and let us know if load times improve?"}
    ]}
];

let activeId = null;
let filterVal = 'all';
let aiCount = 5;

const filtered = () => filterVal === 'all' ? DATA : DATA.filter(t => t.status === filterVal);

function renderList() {
  const el = document.getElementById('tlist');
  const list = filtered();
  if (!list.length) {
    el.innerHTML = '<div style="padding:20px 16px;font-family:\'DM Mono\',monospace;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink4)">No tickets</div>';
    return;
  }
  el.innerHTML = list.map(t => `
    <div class="trow ${t.status==='urgent'?'urg':''} ${t.id===activeId?'on':''}" onclick="open_t(${t.id})">
      <div class="trow-top">
        <div class="trow-subj">${t.subject}</div>
        <div class="trow-age">${t.age}</div>
      </div>
      <div class="trow-foot">
        <span class="tag tag-${t.status}">${t.status}</span>
        <span class="tag tag-ch">${t.channel}</span>
        <span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--ink3);letter-spacing:.04em">${t.customer}</span>
      </div>
    </div>`).join('');
}

function updateStats() {
  document.getElementById('sv-open').textContent     = DATA.filter(t=>t.status==='open').length;
  document.getElementById('sv-urgent').textContent   = DATA.filter(t=>t.status==='urgent').length;
  document.getElementById('sv-resolved').textContent = DATA.filter(t=>t.status==='resolved').length;
  document.getElementById('sv-ai').textContent       = aiCount;
  document.getElementById('nc-all').textContent      = DATA.length;
  document.getElementById('nc-open').textContent     = DATA.filter(t=>t.status==='open').length;
  document.getElementById('nc-urgent').textContent   = DATA.filter(t=>t.status==='urgent').length;
  document.getElementById('nc-resolved').textContent = DATA.filter(t=>t.status==='resolved').length;
}

function open_t(id) {
  activeId = id;
  renderList();
  const t = DATA.find(x => x.id === id);
  document.getElementById('detail').innerHTML = `
    <div class="detail-head">
      <div class="detail-subj">${t.subject}</div>
      <div class="detail-meta">
        <span class="tag tag-${t.status}" id="dbadge-${id}">${t.status}</span>
        <div class="meta-sep"></div>
        <span class="meta-txt">${t.channel}</span>
        <div class="meta-sep"></div>
        <span class="meta-txt">${t.customer}</span>
        <div class="meta-sep"></div>
        <span class="meta-txt">${t.age} ago</span>
      </div>
    </div>
    <div class="thread" id="thread-${id}">${renderMsgs(t.msgs)}</div>
    <div class="reply">
      <div class="reply-tabs">
        <div class="rtab on">Reply</div>
        <div class="rtab" style="opacity:.35">Note</div>
        <div class="rtab" style="opacity:.35">Forward</div>
      </div>
      <div class="reply-body">
        <textarea class="compose" id="compose-${id}" placeholder="Write a reply, or use AI draft…"></textarea>
        <div class="reply-foot">
          <div class="reply-foot-l">
            <select class="ssel" onchange="changeStatus(${id},this.value)">
              <option value="open"     ${t.status==='open'    ?'selected':''}>Open</option>
              <option value="pending"  ${t.status==='pending' ?'selected':''}>Pending</option>
              <option value="urgent"   ${t.status==='urgent'  ?'selected':''}>Urgent</option>
              <option value="resolved" ${t.status==='resolved'?'selected':''}>Resolved</option>
            </select>
            <div class="thinking" id="thinking-${id}">
              <span class="dot">·</span><span class="dot">·</span><span class="dot">·</span>&nbsp;drafting
            </div>
          </div>
          <div style="display:flex;gap:6px">
            <button class="btn" onclick="aiDraft(${id})">AI Draft</button>
            <button class="btn btn-solid" onclick="send(${id})">Send</button>
          </div>
        </div>
      </div>
    </div>`;
}

function renderMsgs(msgs) {
  return msgs.map(m => `
    <div class="msg msg-${m.r==='ai'?'ai':m.r==='agent'?'agent':'customer'}">
      <div class="msg-from">
        ${m.from}
        ${m.r==='ai'?'<span class="ai-mark">AI</span>':''}
      </div>
      ${m.t}
    </div>`).join('');
}

async function aiDraft(id) {
  const t = DATA.find(x => x.id === id);
  const el = document.getElementById(`compose-${id}`);
  const th = document.getElementById(`thinking-${id}`);
  th.classList.add('show');
  el.value = '';
  el.placeholder = 'Drafting…';
  const hist = t.msgs.map(m => `${m.from}: ${m.t}`).join('\n\n');
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514', max_tokens: 300,
        system: 'You are a professional customer support agent. Draft a concise, helpful reply. Output ONLY the reply — no labels, no preamble.',
        messages: [{ role: 'user', content: `Ticket: ${t.subject}\n\n${hist}\n\nDraft a reply:` }]
      })
    });
    const d = await res.json();
    el.value = d.content?.find(c => c.type === 'text')?.text || 'Could not generate a draft.';
  } catch { el.value = 'AI unavailable. Please type your reply.'; }
  el.placeholder = 'Write a reply, or use AI draft…';
  th.classList.remove('show');
}

function send(id) {
  const el = document.getElementById(`compose-${id}`);
  const txt = el.value.trim();
  if (!txt) return;
  const t = DATA.find(x => x.id === id);
  t.msgs.push({ from: 'Support Agent', r: 'agent', t: txt });
  el.value = '';
  const thread = document.getElementById(`thread-${id}`);
  if (thread) {
    const d = document.createElement('div');
    d.className = 'msg msg-agent';
    d.innerHTML = `<div class="msg-from">Support Agent</div>${txt}`;
    thread.appendChild(d);
    thread.scrollTop = thread.scrollHeight;
  }
  renderList(); updateStats();
}

function changeStatus(id, val) {
  const t = DATA.find(x => x.id === id);
  t.status = val;
  const b = document.getElementById(`dbadge-${id}`);
  if (b) { b.className = `tag tag-${val}`; b.textContent = val; }
  renderList(); updateStats();
}

async function aiTriage() {
  const btn = document.getElementById('triage-btn');
  btn.textContent = 'Triaging…'; btn.disabled = true;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514', max_tokens: 400,
        system: 'Triage support tickets. Reply ONLY with valid JSON: [{"id":1,"priority":"urgent"}]. Priorities: urgent, open, pending. Never change resolved tickets.',
        messages: [{ role: 'user', content: 'Triage:\n' + DATA.map(t => `${t.id}: ${t.subject} (${t.status})`).join('\n') }]
      })
    });
    const d = await res.json();
    const raw = d.content?.find(c => c.type === 'text')?.text || '[]';
    JSON.parse(raw.replace(/```json|```/g, '').trim()).forEach(r => {
      const t = DATA.find(x => x.id === r.id);
      if (t && t.status !== 'resolved') t.status = r.priority;
    });
    renderList(); updateStats();
    if (activeId) open_t(activeId);
  } catch {}
  btn.textContent = 'AI Triage'; btn.disabled = false;
}

async function bulkReply() {
  const pending = DATA.filter(t => t.status !== 'resolved' && t.msgs[t.msgs.length - 1]?.r === 'customer');
  if (!pending.length) { alert('No unanswered tickets.'); return; }
  for (const t of pending) {
    const hist = t.msgs.map(m => `${m.from}: ${m.t}`).join('\n\n');
    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514', max_tokens: 250,
          system: 'Professional support agent. Write a concise helpful reply. Output ONLY the reply text.',
          messages: [{ role: 'user', content: `Ticket: ${t.subject}\n\n${hist}\n\nWrite a reply:` }]
        })
      });
      const d = await res.json();
      const txt = d.content?.find(c => c.type === 'text')?.text;
      if (txt) { t.msgs.push({ from: 'AI Agent', r: 'ai', t: txt }); aiCount++; }
    } catch {}
  }
  updateStats(); renderList();
  if (activeId) open_t(activeId);
}

function filter(val, btn) {
  filterVal = val;
  document.querySelectorAll('.fpill').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderList();
}

function setView(view, el) {
  filterVal = view === 'all' ? 'all' : view;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  const titles = { all: 'All tickets', open: 'Open', urgent: 'Urgent', resolved: 'Resolved' };
  document.getElementById('page-title').textContent = titles[view] || 'Tickets';
  renderList();
}

function addTicket() {
  const subj = prompt('Subject:'); if (!subj) return;
  const cust = prompt('Customer name:') || 'New Customer';
  const init = cust.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
  DATA.unshift({ id: Date.now(), subject: subj, customer: cust, initials: init, status: 'open', channel: 'Manual', age: '0m', msgs: [] });
  renderList(); updateStats();
}

renderList(); updateStats(); open_t(1);
</script>
</body>
</html>
